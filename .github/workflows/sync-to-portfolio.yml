name: Sync to Portfolio

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch repo metadata and update portfolio
        env:
          PORTFOLIO_PAT: ${{ secrets.PORTFOLIO_PAT }}
          PORTFOLIO_REPO: ${{ secrets.PORTFOLIO_REPO }}
          REPO_FULL_NAME: ${{ github.repository }}
        run: |
          python3 << 'EOF'
          import os
          import json
          import re
          import subprocess
          import urllib.request

          repo = os.environ["REPO_FULL_NAME"]
          pat = os.environ["PORTFOLIO_PAT"]
          portfolio_repo = os.environ["PORTFOLIO_REPO"]

          # Fetch repo metadata from GitHub API
          def gh_get(url):
              req = urllib.request.Request(
                  url,
                  headers={
                      "Authorization": f"token {pat}",
                      "Accept": "application/vnd.github+json",
                  },
              )
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read())

          data = gh_get(f"https://api.github.com/repos/{repo}")
          topics_data = gh_get(f"https://api.github.com/repos/{repo}/topics")

          repo_name = data["name"]
          description = data.get("description") or ""
          html_url = data["html_url"]
          homepage = data.get("homepage") or ""
          tags = topics_data.get("names", [])

          # Clone the portfolio repo
          clone_url = f"https://x-access-token:{pat}@github.com/{portfolio_repo}.git"
          subprocess.run(["git", "clone", clone_url, "portfolio_repo"], check=True)

          data_js_path = "portfolio_repo/data.js"
          with open(data_js_path, "r") as f:
              content = f.read()

          # Extract the projectsData JSON array from data.js
          match = re.search(r'const projectsData\s*=\s*(\[.*?\]);', content, re.DOTALL)
          if not match:
              raise ValueError("Could not find projectsData array in data.js")

          projects = json.loads(match.group(1))

          # Determine next id
          max_id = max((p.get("id", 0) for p in projects), default=0)

          new_entry = {
              "id": max_id + 1,
              "title": repo_name.replace("-", " ").replace("_", " "),
              "description": description,
              "technologies": [t.capitalize() for t in tags] if tags else [],
              "githubUrl": html_url,
              "demoUrl": homepage,
              "icon": "fas fa-code",
              "featured": True,
          }

          # Upsert: match by githubUrl
          updated = False
          for i, project in enumerate(projects):
              if project.get("githubUrl") == html_url:
                  new_entry["id"] = project["id"]
                  new_entry["icon"] = project.get("icon", "fas fa-code")
                  projects[i] = new_entry
                  updated = True
                  break

          if not updated:
              projects.append(new_entry)

          # Serialize back and replace in data.js
          new_array = json.dumps(projects, indent=4)
          new_content = content[:match.start(1)] + new_array + content[match.end(1):]

          with open(data_js_path, "w") as f:
              f.write(new_content)

          print(f"{'Updated' if updated else 'Added'} entry for '{repo_name}'")
          EOF

      - name: Commit and push changes
        env:
          PORTFOLIO_PAT: ${{ secrets.PORTFOLIO_PAT }}
          PORTFOLIO_REPO: ${{ secrets.PORTFOLIO_REPO }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          cd portfolio_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "No changes to commit" && exit 0
          git add data.js
          git commit -m "chore: sync project '${REPO_NAME}' from automation"
          git push
